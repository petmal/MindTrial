    - name: "cicd - deployment canary instances - v1"
      prompt: |-
        A service has 20 instances behind a round-robin load balancer. You want a canary deployment that routes approximately 10% of traffic to the new version. How many instances should run the new version?
      response-result-format: |-
        <number>
      expected-result:
        - "2"
    - name: "cicd - deployment rollback trigger - v1"
      prompt: |-
        In a production deployment with automated rollback capabilities, which metric is most commonly used as the primary signal to trigger an automatic rollback?

        a) CPU utilization exceeding 80%
        b) Error rate exceeding a defined threshold
        c) Deployment duration exceeding 10 minutes
        d) Number of new log entries
      response-result-format: |-
        <answer letter>)
      expected-result:
        - "b)"
        - "b) Error rate exceeding a defined threshold"
    - name: "cicd - terraform state locking - v1"
      prompt: |-
        In Terraform, what happens if two team members run `terraform apply` simultaneously against the same remote state file without state locking enabled?

        a) Both operations succeed without issues
        b) One operation waits for the other to complete
        c) A race condition can corrupt the state file
        d) Terraform automatically merges the changes
      response-result-format: |-
        <answer letter>)
      expected-result:
        - "c)"
        - "c) A race condition can corrupt the state file"
    - name: "cicd - slo error budget - v1"
      prompt: |-
        An SLO states "99.9% of requests should succeed over a 30-day window." A 30-day month has exactly 43,200 minutes. What is the maximum allowed error budget (downtime/failure window) in minutes?
      response-result-format: |-
        <number> minutes
      expected-result:
        - "43.2 minutes"
        - "43.2"
